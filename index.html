<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>reFuel Gap Analysis</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
  <style>
    :root {
      --bg: #07131a;
      --panel: rgba(11, 24, 32, 0.9);
      --panel-border: rgba(196, 221, 239, 0.14);
      --text: #eef6fb;
      --muted: #9eb7c8;
      --accent: #f0c76e;
      --google: #ff5f5f;
      --fuelcheck: #f0c76e;
      --matched: #47c27d;
      --gap: #ff5f5f;
      --shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(48, 93, 120, 0.28), transparent 32%),
        radial-gradient(circle at top right, rgba(240, 199, 110, 0.14), transparent 28%),
        linear-gradient(180deg, #08161d 0%, #0f232f 100%);
    }

    .app-shell {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    .topbar {
      padding: 24px 24px 16px;
      backdrop-filter: blur(14px);
      background: linear-gradient(180deg, rgba(4, 10, 14, 0.84), rgba(4, 10, 14, 0.55));
      border-bottom: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      z-index: 1000;
    }

    .topbar-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-start;
      justify-content: space-between;
    }

    .heading h1 {
      margin: 0;
      font-size: clamp(2rem, 3.5vw, 3rem);
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .heading p {
      margin: 10px 0 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .updated-at {
      margin-top: 14px;
      color: var(--accent);
      font-size: 0.92rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(110px, 1fr));
      gap: 10px;
      min-width: min(100%, 460px);
    }

    .summary-card {
      padding: 14px 16px;
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .summary-card dt {
      margin: 0;
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .summary-card dd {
      margin: 8px 0 0;
      font-size: 1.7rem;
      font-weight: 700;
    }

    #map {
      width: 100%;
      height: 100%;
      min-height: 60vh;
    }

    .map-wrap {
      position: relative;
      padding: 18px 18px 20px;
    }

    .map-frame {
      height: calc(100vh - 176px);
      min-height: 520px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .map-status {
      position: absolute;
      top: 30px;
      left: 32px;
      z-index: 900;
      padding: 10px 14px;
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      background: rgba(7, 19, 26, 0.88);
      color: var(--muted);
      font-size: 0.9rem;
      backdrop-filter: blur(10px);
    }

    .map-controls {
      line-height: 1.5;
      color: var(--text);
      padding: 12px 14px;
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      background: rgba(7, 19, 26, 0.9);
      box-shadow: var(--shadow);
      max-height: 70vh;
      overflow-y: auto;
    }

    .map-controls strong {
      display: block;
      margin-bottom: 8px;
      color: var(--accent);
      font-size: 0.83rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .fuel-filter {
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--panel-border);
    }

    .fuel-filter label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 4px 0;
      font-size: 0.88rem;
      cursor: pointer;
    }

    .fuel-filter input[type="checkbox"] {
      accent-color: var(--accent);
      cursor: pointer;
    }

    .fuel-filter-actions {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }

    .fuel-filter-actions button {
      background: none;
      border: 1px solid var(--panel-border);
      color: var(--muted);
      font-size: 0.78rem;
      padding: 2px 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .fuel-filter-actions button:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      font-size: 0.92rem;
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.35);
      flex: 0 0 12px;
    }

    .search-bar input {
      width: 180px;
    }

    @media (max-width: 560px) {
      .search-bar input {
        width: 130px;
        font-size: 12px !important;
      }
    }

    /* Mobile: fuel filter as collapsible pill, legend horizontal at bottom */
    @media (max-width: 900px) {
      .map-controls {
        padding: 8px 10px;
        border-radius: 12px;
        max-height: none;
        overflow: visible;
      }
      .map-controls strong {
        font-size: 0.75rem;
        margin-bottom: 4px;
      }
      .fuel-filter {
        margin-bottom: 6px;
        padding-bottom: 6px;
      }
      .fuel-filter-toggle {
        display: inline-flex !important;
      }
      .fuel-filter-body {
        display: none;
      }
      .fuel-filter-body.open {
        display: block;
      }
      .fuel-filter label {
        font-size: 0.8rem;
        margin: 2px 0;
        gap: 4px;
      }
      .legend-item {
        font-size: 0.78rem;
        margin: 2px 0;
        gap: 5px;
      }
      .legend-swatch {
        width: 10px;
        height: 10px;
      }
    }

    .station-marker {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.85);
      box-shadow: 0 0 0 3px rgba(4, 10, 14, 0.18);
    }

    .station-marker.google { background: var(--google); }
    .station-marker.fuelcheck { background: var(--fuelcheck); }
    .station-marker.matched { background: var(--matched); }
    .station-marker.gap { background: var(--gap); }

    .popup {
      color: #11202b;
      min-width: 260px;
      max-width: 340px;
    }

    .popup h3 {
      margin: 0 0 4px;
      font-size: 0.92rem;
      color: #333;
    }

    .popup .src-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin: 8px 0 2px;
    }

    .popup .src-label:first-child {
      margin-top: 0;
    }

    .popup p {
      margin: 0 0 4px;
      font-size: 0.88rem;
    }

    .popup .tab-bar {
      display: flex;
      gap: 0;
      border-bottom: 2px solid #ddd;
      margin: 8px 0 6px;
    }

    .popup .tab-btn {
      padding: 4px 10px;
      font-size: 0.8rem;
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      color: #666;
    }

    .popup .tab-btn.active {
      border-bottom-color: #4d9fff;
      color: #11202b;
      font-weight: 600;
    }

    .popup .tab-panel {
      display: none;
    }

    .popup .tab-panel.active {
      display: block;
    }

    .popup ul {
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 0.88rem;
    }

    .popup li + li {
      margin-top: 3px;
    }

    .popup li strong {
      display: inline-block;
      min-width: 36px;
    }

    .station-tooltip {
      background: white;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 8px 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      font-size: 0.82rem;
      color: #222;
      max-width: 280px;
      line-height: 1.4;
    }

    .station-tooltip b {
      color: #555;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .station-tooltip small {
      color: #777;
    }

    .station-popup-wrapper .leaflet-popup-content {
      margin: 10px 12px;
    }

    .data-section {
      padding: 0 18px 32px;
    }

    .data-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--panel-border);
      margin-bottom: 0;
    }

    .data-tab-btn {
      padding: 10px 18px;
      font-size: 0.9rem;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      font-family: inherit;
      letter-spacing: 0.02em;
      transition: color 0.15s, border-color 0.15s;
    }

    .data-tab-btn:hover {
      color: var(--text);
    }

    .data-tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }

    .data-tab-btn .badge {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--panel-border);
      color: var(--muted);
    }

    .data-tab-btn.active .badge {
      background: var(--accent);
      color: var(--bg);
    }

    .data-table-wrap {
      max-height: 420px;
      overflow-y: auto;
      border: 1px solid var(--panel-border);
      border-top: none;
      border-radius: 0 0 16px 16px;
      background: var(--panel);
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .data-table thead {
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .data-table th {
      padding: 10px 14px;
      text-align: left;
      background: rgba(11, 24, 32, 0.98);
      color: var(--accent);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--panel-border);
    }

    .data-table td {
      padding: 8px 14px;
      border-bottom: 1px solid var(--panel-border);
      color: var(--text);
    }

    .data-table tr:hover td {
      background: rgba(77, 159, 255, 0.06);
    }

    .data-table .swatch {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .data-empty {
      padding: 32px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 900px) {
      .topbar {
        padding: 18px 16px 14px;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
        width: 100%;
      }

      .map-wrap {
        padding: 12px;
      }

      .map-frame {
        height: calc(100vh - 255px);
        min-height: 500px;
      }
    }

    @media (max-width: 560px) {
      .summary {
        grid-template-columns: 1fr 1fr;
      }

      .map-status {
        top: 20px;
        left: 20px;
        right: 20px;
        border-radius: 14px;
      }

      .map-frame {
        height: calc(100vh - 304px);
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="heading">
          <h1>reFuel</h1>
          <p id="avail-line" style="color:var(--accent);font-size:1.05rem;margin:10px 0 4px;font-weight:600;">Loading...</p>
          <p style="color:var(--muted);font-size:0.72rem;font-style:italic;margin:0 0 6px;">* assuming that fuel stations listed online sell all fuel types usually</p>
          <div class="updated-at">Last updated: <span id="last-updated">-</span></div>
        </div>
        <div class="summary-wrap">
          <dl class="summary" id="summary-panel">
            <div class="summary-card">
              <dt style="color:var(--matched)">Available</dt>
              <dd id="available-count">-</dd>
            </div>
            <div class="summary-card">
              <dt style="color:var(--gap)">N/A**</dt>
              <dd id="notlisted-count">-</dd>
            </div>
            <div class="summary-card">
              <dt style="color:var(--fuelcheck)">Unsure</dt>
              <dd id="unsure-count">-</dd>
            </div>
          </dl>
          <p style="color:var(--gap);font-size:0.7rem;margin:6px 0 0;">** Stations not listed as having fuel in official NSW Fuel Check Govt data</p>
        </div>
      </div>
    </header>
    <main class="map-wrap">
      <div class="map-status" id="map-status">Loading station datasets...</div>
      <div class="map-frame">
        <div id="map" aria-label="Fuel station gap analysis map"></div>
      </div>
    </main>
    <section class="data-section">
      <div class="data-tabs" id="data-tabs">
        <button class="data-tab-btn active" data-tab="gaps">Gaps <span class="badge" id="tab-badge-gaps">0</span></button>
        <button class="data-tab-btn" data-tab="matched">Matched <span class="badge" id="tab-badge-matched">0</span></button>
        <button class="data-tab-btn" data-tab="google">Google Only <span class="badge" id="tab-badge-google">0</span></button>
        <button class="data-tab-btn" data-tab="fuelcheck">FuelCheck Only <span class="badge" id="tab-badge-fuelcheck">0</span></button>
      </div>
      <div class="data-table-wrap">
        <table class="data-table">
          <thead id="data-thead"></thead>
          <tbody id="data-tbody"></tbody>
        </table>
        <div class="data-empty" id="data-empty" style="display:none;">No stations in this category.</div>
      </div>
    </section>
  </div>

  <script>
    const MATCH_THRESHOLD_METERS = 100;

    const map = L.map("map", {
      zoomControl: true,
      preferCanvas: true
    }).setView([-33.79, 151.08], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Event delegation for popup tab switching (DOMPurify strips onclick)
    document.addEventListener("click", function(e) {
      var btn = e.target.closest("[data-tab-target]");
      if (!btn) return;
      var popup = btn.closest(".popup");
      if (!popup) return;
      popup.querySelectorAll(".tab-btn").forEach(function(b) { b.classList.remove("active"); });
      popup.querySelectorAll(".tab-panel").forEach(function(p) { p.classList.remove("active"); });
      btn.classList.add("active");
      var target = document.getElementById(btn.getAttribute("data-tab-target"));
      if (target) target.classList.add("active");
    });

    L.control.scale({ imperial: false }).addTo(map);

    // Locate-me button
    const locateCtrl = L.control({ position: "topleft" });
    locateCtrl.onAdd = function() {
      const btn = L.DomUtil.create("div", "leaflet-bar");
      const a = L.DomUtil.create("a", "", btn);
      a.href = "#";
      a.title = "Zoom to my location";
      a.setAttribute("role", "button");
      a.style.cssText = "display:flex;align-items:center;justify-content:center;width:34px;height:34px;font-size:18px;cursor:pointer;background:#fff;color:#333;";
      a.textContent = "\u2316";
      let locMarker = null;
      L.DomEvent.on(a, "click", function(e) {
        L.DomEvent.preventDefault(e);
        a.textContent = "\u2026";
        navigator.geolocation.getCurrentPosition(
          function(pos) {
            const ll = [pos.coords.latitude, pos.coords.longitude];
            map.setView(ll, 15);
            if (locMarker) map.removeLayer(locMarker);
            locMarker = L.circleMarker(ll, {
              radius: 8, fillColor: "#4285f4", fillOpacity: 1,
              color: "#fff", weight: 2
            }).addTo(map).bindPopup("You are here");
            a.textContent = "\u2316";
          },
          function() { a.textContent = "\u2316"; },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      });
      return btn;
    };
    locateCtrl.addTo(map);

    // Address search control
    const searchCtrl = L.control({ position: "topleft" });
    let searchMarker = null;
    searchCtrl.onAdd = function() {
      const container = L.DomUtil.create("div", "leaflet-bar search-bar");
      container.style.cssText = "display:flex;background:#fff;border-radius:4px;overflow:hidden;position:absolute;top:10px;left:50px;z-index:1000;";
      const input = L.DomUtil.create("input", "", container);
      input.type = "text";
      input.placeholder = "Search address...";
      input.style.cssText = "border:none;outline:none;padding:6px 10px;font-size:13px;width:180px;color:#333;";
      const go = L.DomUtil.create("a", "", container);
      go.href = "#";
      go.textContent = "\u2315";
      go.title = "Search";
      go.style.cssText = "display:flex;align-items:center;justify-content:center;width:34px;font-size:16px;cursor:pointer;color:#333;text-decoration:none;";
      L.DomEvent.disableClickPropagation(container);
      L.DomEvent.disableScrollPropagation(container);

      function doSearch() {
        const q = input.value.trim();
        if (!q) return;
        go.textContent = "\u2026";
        fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" + encodeURIComponent(q + " NSW Australia"))
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.length) {
              var ll = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
              map.setView(ll, 15);
              if (searchMarker) map.removeLayer(searchMarker);
              searchMarker = L.marker(ll).addTo(map).bindPopup(data[0].display_name).openPopup();
            }
            go.textContent = "\u2315";
          })
          .catch(function() { go.textContent = "\u2315"; });
      }

      L.DomEvent.on(go, "click", function(e) { L.DomEvent.preventDefault(e); doSearch(); });
      L.DomEvent.on(input, "keydown", function(e) { if (e.key === "Enter") doSearch(); });
      return container;
    };
    searchCtrl.addTo(map);

    const layers = {
      google: L.layerGroup().addTo(map),
      fuelcheck: L.layerGroup().addTo(map),
      matched: L.layerGroup().addTo(map),
      gap: L.layerGroup().addTo(map)
    };

    // Fuel types to show in the filter (EV excluded)
    const ALL_FUEL_TYPES = ["U91", "E10", "E85", "P95", "P98", "DL", "PDL", "LPG"];
    let selectedFuelTypes = new Set(ALL_FUEL_TYPES);

    const controlPanel = L.control({ position: "bottomright" });
    controlPanel.onAdd = function onAdd() {
      const div = L.DomUtil.create("div", "map-controls");
      L.DomEvent.disableClickPropagation(div);
      L.DomEvent.disableScrollPropagation(div);

      // Build filter with collapsible toggle for mobile
      const filterContainer = L.DomUtil.create("div", "fuel-filter", div);

      const toggle = L.DomUtil.create("button", "fuel-filter-toggle", filterContainer);
      toggle.textContent = "Fuel Types \u25BC";
      toggle.style.cssText = "display:none;background:none;border:1px solid var(--panel-border);color:var(--accent);font-size:0.78rem;padding:3px 10px;border-radius:99px;cursor:pointer;margin-bottom:4px;";

      const filterBody = L.DomUtil.create("div", "fuel-filter-body", filterContainer);
      const filterTitle = L.DomUtil.create("strong", "", filterBody);
      filterTitle.textContent = "Fuel Types";

      var FUEL_LABELS = { U91: "U91", E10: "E10", E85: "E85", P95: "P95", P98: "P98", DL: "Diesel", PDL: "Premium Diesel", LPG: "LPG" };

      ALL_FUEL_TYPES.forEach((ft) => {
        const label = L.DomUtil.create("label", "", filterBody);
        const cb = L.DomUtil.create("input", "", label);
        cb.type = "checkbox";
        cb.value = ft;
        cb.checked = true;
        label.appendChild(document.createTextNode(" " + (FUEL_LABELS[ft] || ft)));
        cb.addEventListener("change", function () {
          if (this.checked) {
            selectedFuelTypes.add(this.value);
          } else {
            selectedFuelTypes.delete(this.value);
          }
          rerender();
        });
      });

      const actions = L.DomUtil.create("div", "fuel-filter-actions", filterBody);
      const btnAll = L.DomUtil.create("button", "", actions);
      btnAll.textContent = "All";
      btnAll.addEventListener("click", () => {
        selectedFuelTypes = new Set(ALL_FUEL_TYPES);
        div.querySelectorAll('.fuel-filter-body input[type="checkbox"]').forEach((cb) => { cb.checked = true; });
        rerender();
      });
      const btnNone = L.DomUtil.create("button", "", actions);
      btnNone.textContent = "None";
      btnNone.addEventListener("click", () => {
        selectedFuelTypes.clear();
        div.querySelectorAll('.fuel-filter-body input[type="checkbox"]').forEach((cb) => { cb.checked = false; });
        rerender();
      });

      toggle.addEventListener("click", function() {
        var body = filterContainer.querySelector(".fuel-filter-body");
        var isOpen = body.classList.toggle("open");
        toggle.textContent = "Fuel Types " + (isOpen ? "\u25B2" : "\u25BC");
      });

      // Legend — horizontal row
      const legendRow = L.DomUtil.create("div", "legend-row", div);
      const legendItems = [
        { color: cssVar("--matched"), label: "Available" },
        { color: cssVar("--gap"), label: "N/A" },
        { color: cssVar("--fuelcheck"), label: "Unsure - check" }
      ];
      legendItems.forEach(({ color, label }) => {
        const item = L.DomUtil.create("div", "legend-item", legendRow);
        const swatch = L.DomUtil.create("span", "legend-swatch", item);
        swatch.style.background = color;
        item.appendChild(document.createTextNode(label));
      });

      return div;
    };
    controlPanel.addTo(map);

    function cssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function setStatus(message) {
      document.getElementById("map-status").textContent = message;
    }

    function setSummary(stats) {
      document.getElementById("available-count").textContent = stats.available;
      document.getElementById("notlisted-count").textContent = stats.notlisted;
      document.getElementById("unsure-count").textContent = stats.unsure;
    }

    function formatUpdatedDate(...timestamps) {
      const valid = timestamps
        .filter(Boolean)
        .map((value) => new Date(value))
        .filter((value) => !Number.isNaN(value.getTime()))
        .sort((a, b) => a.getTime() - b.getTime());

      if (!valid.length) {
        return "-";
      }

      return valid[0].toLocaleString("en-AU", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function toRadians(value) {
      return (value * Math.PI) / 180;
    }

    function haversineDistanceMeters(a, b) {
      const earthRadius = 6371000;
      const dLat = toRadians(b.lat - a.lat);
      const dLng = toRadians(b.lng - a.lng);
      const lat1 = toRadians(a.lat);
      const lat2 = toRadians(b.lat);
      const sinLat = Math.sin(dLat / 2);
      const sinLng = Math.sin(dLng / 2);
      const h =
        sinLat * sinLat +
        Math.cos(lat1) * Math.cos(lat2) * sinLng * sinLng;
      return 2 * earthRadius * Math.asin(Math.sqrt(h));
    }

    function markerIcon(type) {
      return L.divIcon({
        className: "",
        html: DOMPurify.sanitize(`<div class="station-marker ${type}"></div>`),
        iconSize: [18, 18],
        iconAnchor: [9, 9],
        popupAnchor: [0, -10]
      });
    }

    function escapeHtml(value) {
      return DOMPurify.sanitize(String(value ?? ""));
    }

    function formatPrices(prices) {
      if (!prices || !prices.length) {
        return "<p>No FuelCheck pricing data.</p>";
      }
      const items = prices
        .map((p) => `<li><strong>${escapeHtml(p.fuel_type)}</strong> ${escapeHtml(p.price)}¢/L</li>`)
        .join("");
      return `<ul>${items}</ul>`;
    }

    let popupIdCounter = 0;

    function popupContent(data) {
      const id = "pop" + (popupIdCounter++);
      const fc = data.fuelcheck;
      const goog = data.google;
      const distance = data.matchDistanceMeters;

      let infoHtml = "";

      if (fc) {
        infoHtml += `<div class="src-label">FuelCheck API</div>`;
        infoHtml += `<h3>${escapeHtml(fc.name)}</h3>`;
        infoHtml += `<p>${escapeHtml(fc.address || "")}</p>`;
      }
      if (goog) {
        infoHtml += `<div class="src-label">Google Maps</div>`;
        infoHtml += `<h3>${escapeHtml(goog.name)}</h3>`;
        infoHtml += `<p>${escapeHtml(goog.address || "")}</p>`;
      }
      if (!fc && !goog) {
        infoHtml += `<h3>Unknown station</h3>`;
      }
      if (distance != null) {
        infoHtml += `<p style="font-size:0.8rem;color:#888;">Match distance: ${Math.round(distance)}m</p>`;
      }

      const fuelHtml = fc ? formatPrices(data.prices || fc.prices) : "<p>No FuelCheck data for this station.</p>";

      const content = `
        <div class="popup">
          <div class="tab-bar">
            <button class="tab-btn active" data-tab-target="${id}-info">Info</button>
            <button class="tab-btn" data-tab-target="${id}-fuel">Fuel</button>
          </div>
          <div id="${id}-info" class="tab-panel active">${infoHtml}</div>
          <div id="${id}-fuel" class="tab-panel">${fuelHtml}</div>
        </div>
      `;
      return DOMPurify.sanitize(content, { ADD_ATTR: ["data-tab-target"] });
    }

    function addMarker(data, type) {
      const lat = data.lat || (data.fuelcheck && data.fuelcheck.lat) || (data.google && data.google.lat);
      const lng = data.lng || (data.fuelcheck && data.fuelcheck.lng) || (data.google && data.google.lng);
      const marker = L.marker([lat, lng], { icon: markerIcon(type) });
      marker.bindPopup(popupContent(data), {
        maxWidth: 360,
        minWidth: 260,
        className: "station-popup-wrapper"
      });
      // Lightweight hover tooltip with both source names
      const tooltipLines = [];
      if (data.fuelcheck) tooltipLines.push(`<b>FC:</b> ${escapeHtml(data.fuelcheck.name)}<br><small>${escapeHtml(data.fuelcheck.address || "")}</small>`);
      if (data.google) tooltipLines.push(`<b>G:</b> ${escapeHtml(data.google.name)}<br><small>${escapeHtml(data.google.address || "")}</small>`);
      if (!data.fuelcheck && !data.google) tooltipLines.push("Unknown station");
      marker.bindTooltip(DOMPurify.sanitize(tooltipLines.join("<hr style='margin:4px 0;border-color:#ddd'>")), {
        direction: "top",
        sticky: false,
        opacity: 1,
        className: "station-tooltip"
      });
      layers[type].addLayer(marker);
    }

    function nearestFuelcheckStation(googleStation, fuelStations, usedFuelIds) {
      let bestMatch = null;
      let bestDistance = Infinity;

      fuelStations.forEach((fuelStation) => {
        const identifier = fuelStation.id || `${fuelStation.name}|${fuelStation.address}`;
        if (usedFuelIds.has(identifier)) {
          return;
        }

        const distance = haversineDistanceMeters(googleStation, fuelStation);
        if (distance < bestDistance) {
          bestDistance = distance;
          bestMatch = fuelStation;
        }
      });

      if (!bestMatch || bestDistance > MATCH_THRESHOLD_METERS) {
        return null;
      }

      return { station: bestMatch, distance: bestDistance };
    }

    async function fetchJson(path) {
      const response = await fetch(path, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Failed to load ${path}: ${response.status}`);
      }
      return response.json();
    }

    // Raw data stored for re-rendering on filter change
    let rawGoogleStations = [];
    let rawFuelcheckStations = [];

    function isEvOnly(station) {
      const types = (station.prices || []).map((p) => p.fuel_type);
      return types.length > 0 && types.every((t) => t === "EV");
    }

    function hasSelectedFuelType(station) {
      if (!station.prices || !station.prices.length) return true; // Google stations have no prices — always show
      const types = (station.prices || []).map((p) => p.fuel_type);
      return types.some((t) => selectedFuelTypes.has(t));
    }

    function filterPricesToSelected(station) {
      if (!station.prices) return station;
      return {
        ...station,
        prices: station.prices.filter((p) => selectedFuelTypes.has(p.fuel_type))
      };
    }

    function rerender() {
      Object.values(layers).forEach((layer) => layer.clearLayers());

      const fuelcheckFiltered = rawFuelcheckStations.filter((s) => hasSelectedFuelType(s));

      const usedFuelIds = new Set();
      let matchedCount = 0;
      let gapCount = 0;

      // Reset table data
      tableData = { gaps: [], matched: [], google: [], fuelcheck: [] };

      rawGoogleStations.forEach((googleStation) => {
        const match = nearestFuelcheckStation(googleStation, fuelcheckFiltered, usedFuelIds);
        if (match) {
          const identifier = match.station.id || `${match.station.name}|${match.station.address}`;
          usedFuelIds.add(identifier);
          matchedCount += 1;
          const filtered = filterPricesToSelected(match.station);
          addMarker({
            fuelcheck: match.station,
            google: googleStation,
            prices: filtered.prices,
            matchDistanceMeters: match.distance,
            lat: match.station.lat,
            lng: match.station.lng
          }, "matched");
          tableData.matched.push([
            match.station.name || "",
            googleStation.name || "",
            match.station.address || googleStation.address || "",
            Math.round(match.distance) + "m"
          ]);
        } else {
          gapCount += 1;
          addMarker({
            google: googleStation,
            fuelcheck: null,
            lat: googleStation.lat,
            lng: googleStation.lng
          }, fuelcheckFiltered.length ? "gap" : "google");
          if (fuelcheckFiltered.length) {
            tableData.gaps.push([
              googleStation.name || "",
              googleStation.address || "",
              "Google Maps"
            ]);
          } else {
            tableData.google.push([
              googleStation.name || "",
              googleStation.address || ""
            ]);
          }
        }
      });

      // Only show fuelcheck-only markers near scraped areas (within 2km of any Google station)
      const COVERAGE_RADIUS_M = 2000;
      let fuelcheckOnlyCount = 0;
      fuelcheckFiltered.forEach((fuelStation) => {
        const identifier = fuelStation.id || `${fuelStation.name}|${fuelStation.address}`;
        if (!usedFuelIds.has(identifier)) {
          const nearScraped = rawGoogleStations.some(
            (g) => haversineDistanceMeters(g, fuelStation) <= COVERAGE_RADIUS_M
          );
          if (!nearScraped) return;
          fuelcheckOnlyCount += 1;
          const filtered = filterPricesToSelected(fuelStation);
          addMarker({
            fuelcheck: fuelStation,
            google: null,
            prices: filtered.prices,
            lat: fuelStation.lat,
            lng: fuelStation.lng
          }, "fuelcheck");
          tableData.fuelcheck.push([
            fuelStation.name || "",
            fuelStation.brand || "",
            fuelStation.address || "",
            (fuelStation.prices || []).map((p) => p.fuel_type).join(", ")
          ]);
          tableData.gaps.push([
            fuelStation.name || "",
            fuelStation.address || "",
            "FuelCheck only"
          ]);
        }
      });

      setSummary({
        available: matchedCount,
        notlisted: gapCount,
        unsure: fuelcheckOnlyCount
      });

      document.getElementById("map-status").style.display = "none";

      // Update availability percentage line
      const pct = rawGoogleStations.length ? Math.round((matchedCount / rawGoogleStations.length) * 100) : 0;
      const filtering = selectedFuelTypes.size < ALL_FUEL_TYPES.length;
      const fuelLabel = filtering ? [...selectedFuelTypes].join(", ") : "any";
      document.getElementById("avail-line").innerHTML = DOMPurify.sanitize(
        `<strong>${pct}%</strong> of local petrol stations are matched on FuelCheck as having <span style="color:var(--fuelcheck);font-weight:600;">${escapeHtml(fuelLabel)}</span> fuel.*`
      );

      updateTableBadges();
      renderTable();
    }

    // --- Data table ---
    let tableData = { gaps: [], matched: [], google: [], fuelcheck: [] };
    let activeTab = "gaps";

    document.getElementById("data-tabs").addEventListener("click", (e) => {
      const btn = e.target.closest(".data-tab-btn");
      if (!btn) return;
      activeTab = btn.dataset.tab;
      document.querySelectorAll(".data-tab-btn").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      renderTable();
    });

    function renderTable() {
      const thead = document.getElementById("data-thead");
      const tbody = document.getElementById("data-tbody");
      const empty = document.getElementById("data-empty");
      const rows = tableData[activeTab] || [];

      if (!rows.length) {
        thead.textContent = "";
        tbody.textContent = "";
        empty.style.display = "block";
        return;
      }
      empty.style.display = "none";

      const colDefs = {
        gaps:      ["Station", "Address", "Source"],
        matched:   ["FuelCheck", "Google", "Address", "Distance"],
        google:    ["Station", "Address"],
        fuelcheck: ["Station", "Brand", "Address", "Fuels"]
      };

      const cols = colDefs[activeTab] || [];

      // Build thead
      thead.textContent = "";
      const headRow = document.createElement("tr");
      cols.forEach((c) => {
        const th = document.createElement("th");
        th.textContent = c;
        headRow.appendChild(th);
      });
      thead.appendChild(headRow);

      // Build tbody
      tbody.textContent = "";
      rows.forEach((r) => {
        const tr = document.createElement("tr");
        r.forEach((cellVal) => {
          const td = document.createElement("td");
          td.textContent = cellVal;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    function updateTableBadges() {
      ["gaps", "matched", "google", "fuelcheck"].forEach((key) => {
        const el = document.getElementById("tab-badge-" + key);
        if (el) el.textContent = (tableData[key] || []).length;
      });
    }

    async function loadApp() {
      try {
        const [googleStations, fuelcheckStations, googleMeta, fuelcheckMeta] = await Promise.all([
          fetchJson("data/google_stations.json").catch(() => []),
          fetchJson("data/fuelcheck_stations.json").catch(() => []),
          fetchJson("data/google_meta.json").catch(() => ({})),
          fetchJson("data/fuelcheck_meta.json").catch(() => ({}))
        ]);

        document.getElementById("last-updated").textContent = formatUpdatedDate(
          googleMeta.last_updated,
          fuelcheckMeta.last_updated
        );

        // Exclude EV-only stations permanently
        rawGoogleStations = googleStations;
        rawFuelcheckStations = fuelcheckStations.filter((s) => !isEvOnly(s));

        rerender();

        const allCoords = rawGoogleStations
          .map((s) => [s.lat, s.lng])
          .filter(([lat, lng]) => Number.isFinite(lat) && Number.isFinite(lng));

        if (allCoords.length) {
          map.fitBounds(allCoords, { padding: [36, 36] });
        } else {
          setStatus("No station data found yet. Run the scraper and FuelCheck script, then refresh.");
        }
      } catch (error) {
        console.error(error);
        setStatus("Failed to load station data. Serve this directory over http://localhost instead of file://.");
      }
    }

    loadApp();
  </script>
</body>
</html>
